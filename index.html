<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Legendice ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffeef2;
            color: #4a3b40;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(224, 143, 164, 0.3);
            text-align: center;
            margin-top: 20px;
            border: 2px solid #ffccd7;
        }

        h1 {
            color: #d6336c;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #868e96;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .btn {
            background-color: #d6336c;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(214, 51, 108, 0.2);
        }

        .btn:hover {
            background-color: #c2255c;
            transform: translateY(-2px);
        }

        .upload-box {
            border: 3px dashed #ffb3c6;
            padding: 30px 20px;
            border-radius: 15px;
            background: #fff5f7;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
        }

        .upload-box input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 40px;
            color: #ff85a2;
            margin-bottom: 10px;
        }

        .poll-option {
            background: #fff5f7;
            border: 2px solid #ffccd7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .poll-option:hover {
            background: #ffe3e8;
            border-color: #ff85a2;
        }

        .poll-option input {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: #d6336c;
        }

        .feed-container {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            padding-right: 5px;
        }

        .post-card {
            background: #fff;
            border: 1px solid #ffccd7;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .post-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
            max-height: 250px;
            object-fit: cover;
        }

        .post-meta {
            font-size: 12px;
            color: #adb5bd;
            margin-bottom: 5px;
        }

        .post-text {
            font-size: 15px;
            color: #4a3b40;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .reactions {
            display: flex;
            gap: 15px;
            border-top: 1px solid #f1f3f5;
            padding-top: 8px;
        }

        .react-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #868e96;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd7;
            border-radius: 12px;
            margin-bottom: 10px;
            outline: none;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: #ff85a2;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d6336c;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <div id="screen-gate" class="screen active">
            <h1>Gospodine Savršeni</h1>
            <p class="subtitle"> ubaci sliku ovde </p>
            
            <div class="upload-box">
                <div class="upload-icon">📸</div>
                <p id="upload-status-text">Klikni ovde ili prevuci sliku</p>
                <input type="file" id="gate-file-input" accept="image/*">
            </div>
            <div id="gate-loader" class="loader"></div>
            <button class="btn" id="btn-gate-next" style="display: none;">Otvori kapiju ✨</button>
        </div>

        <div id="screen-poll" class="screen">
            <h1>Kako si mi danas? 🥰</h1>
            <p class="subtitle">Izaberi odgovor da bismo produžili dalje...</p>
            
            <div class="poll-option" onclick="selectPoll(this, 'Odlično, jedva čekam da te vidim!')">
                <input type="radio" name="mood" id="opt1">
                <label for="opt1">☀️ Odlično, sve je top!</label>
            </div>
            <div class="poll-option" onclick="selectPoll(this, 'Onako, malo sam umoran.')">
                <input type="radio" name="mood" id="opt2">
                <label for="opt2">☁️ Onako, malo sam umoran.</label>
            </div>
            <div class="poll-option" onclick="selectPoll(this, 'Nisam baš najbolje...')">
                <input type="radio" name="mood" id="opt3">
                <label for="opt3">🌧️ Nisam baš najbolje, muci me nesto. </label>
            </div>

            <div id="poll-loader" class="loader"></div>
            <button class="btn" id="btn-poll-submit" disabled style="opacity: 0.5;">Pošalji odgovor 💌</button>
        </div>

        <div id="screen-main" class="screen">
            <h1 id="welcome-title"> Legindice </h1>
            <p class="subtitle" id="sweet-comment">Hvala ti na odgovoru!</p>
            
            <div style="border: 1px dashed #ffccd7; padding: 15px; border-radius: 12px; background: #fffafb; margin-bottom: 20px;">
                <h3 style="font-size: 14px; margin-bottom: 8px; color: #d6336c;">Dodaj nešto na naš zid</h3>
                <input type="text" id="post-text-input" class="input-field" placeholder="Napiši poruku...">
                
                <div class="upload-box" style="padding: 15px; margin-bottom: 10px; font-size: 13px;">
                    <span id="feed-upload-status">Dodaj i sliku (opciono) 📷</span>
                    <input type="file" id="feed-file-input" accept="image/*">
                </div>
                <div id="feed-loader" class="loader"></div>
                <button class="btn" id="btn-send-post" style="margin-top: 5px; padding: 8px;">Zakači na zid 📌</button>
            </div>

            <h2 style="font-size: 16px; text-align: left; color: #d6336c; margin-bottom: 10px;">Uspomene i poruke:</h2>
            <div class="feed-container" id="feed-container"></div>
        </div>
    </div>

    <script>
        // --- KONFIGURACIJA SUPABASE ---
        const SUPABASE_URL = "https://qboyewrrbravcruiciyf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_secret_JMNyx8dkBZsCSh7f1T7lYA_FVH71Imi"; 

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let selectedMood = "";
        let uploadedImageUrl = "";
        let currentUser = "Dečko"; 

        const gateFileInput = document.getElementById('gate-file-input');
        const uploadStatusText = document.getElementById('upload-status-text');
        const btnGateNext = document.getElementById('btn-gate-next');
        const gateLoader = document.getElementById('gate-loader');

        gateFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadStatusText.innerText = `Učitavam: ${file.name}...`;
            gateLoader.style.display = "block";

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `gate_${Date.now()}.${fileExt}`;

                let { error: uploadError } = await supabase.storage
                    .from('slike')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                const { data } = supabase.storage
                    .from('slike')
                    .getPublicUrl(fileName);

                uploadedImageUrl = data.publicUrl;

                uploadStatusText.innerText = "Slika uspešno ubačena! 🥰";
                gateLoader.style.display = "none";
                btnGateNext.style.display = "block";

            } catch (error) {
                console.error(error);
                uploadStatusText.innerText = "Greška pri uploadu. Pokušaj ponovo.";
                gateLoader.style.display = "none";
            }
        });

        btnGateNext.addEventListener('click', () => {
            document.getElementById('screen-gate').classList.remove('active');
            document.getElementById('screen-poll').classList.add('active');
        });

        function selectPoll(element, mood) {
            selectedMood = mood;
            document.querySelectorAll('.poll-option').forEach(opt => {
                opt.style.background = "#fff5f7";
                opt.style.borderColor = "#ffccd7";
            });
            element.style.background = "#ffe3e8";
            element.style.borderColor = "#ff85a2";
            element.querySelector('input').checked = true;

            const btnSubmit = document.getElementById('btn-poll-submit');
            btnSubmit.disabled = false;
            btnSubmit.style.opacity = "1";
        }

        document.getElementById('btn-poll-submit').addEventListener('click', async () => {
            const pollLoader = document.getElementById('poll-loader');
            pollLoader.style.display = "block";

            try {
                await supabase
                    .from('anketa')
                    .insert([{ odgovor: selectedMood }]);

                await supabase
                    .from('poruke')
                    .insert([{
                        autor: currentUser,
                        tekst: `Danas se osećam: ${selectedMood}`,
                        reakcija: "❤️"
                    }]);

                let sweetComment = "Predivno je što si tu!😍";
                if (selectedMood.includes('umoran')) {
                    sweetComment = "Znam da si umoran, šaljem ti poljubac! 💋";
                } else if (selectedMood.includes('najbolje')) {
                    sweetComment = "Ooo ne... 💔 Javi mi se odmah!";
                }
                document.getElementById('sweet-comment').innerText = sweetComment;

                pollLoader.style.display = "none";
                document.getElementById('screen-poll').classList.remove('active');
                document.getElementById('screen-main').classList.add('active');
                
                loadFeed();

            } catch (error) {
                console.error(error);
                alert("Došlo je do greške.");
                pollLoader.style.display = "none";
            }
        });

        let feedFileUrl = "";
        const feedFileInput = document.getElementById('feed-file-input');
        const feedUploadStatus = document.getElementById('feed-upload-status');
        const feedLoader = document.getElementById('feed-loader');

        feedFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            feedUploadStatus.innerText = "Učitavanje slike...";
            feedLoader.style.display = "block";

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `feed_${Date.now()}.${fileExt}`;
                
                let { error: uploadError } = await supabase.storage
                    .from('slike')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                const { data } = supabase.storage
                    .from('slike')
                    .getPublicUrl(fileName);

                feedFileUrl = data.publicUrl;
                feedUploadStatus.innerText = "Slika spremna za kačenje! 📸";
                feedLoader.style.display = "none";
            } catch (error) {
                console.error(error);
                feedLoader.style.display = "none";
            }
        });

        document.getElementById('btn-send-post').addEventListener('click', async () => {
            const textInput = document.getElementById('post-text-input');
            const text = textInput.value.trim();

            if (!text && !feedFileUrl) {
                alert("Napiši neku poruku ili ubaci sliku!");
                return;
            }

            try {
                await supabase
                    .from('poruke')
                    .insert([{
                        autor: currentUser,
                        tekst: text,
                        reakcija: ""
                    }]);

                textInput.value = "";
                feedFileUrl = "";
                feedUploadStatus.innerText = "Dodaj i sliku (opciono) 📷";

                loadFeed();

            } catch (error) {
                console.error(error);
                alert("Greška pri slanju.");
            }
        });

        async function loadFeed() {
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = "<p style='color:#adb5bd;'>Učitavam zid...</p>";

            try {
                let { data: poruke, error } = await supabase
                    .from('poruke')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                feedContainer.innerHTML = "";
                
                if (poruke.length === 0) {
                    feedContainer.innerHTML = "<p style='color:#adb5bd;'>Zid je prazan. Napišite nešto!</p>";
                    return;
                }

                poruke.forEach(post => {
                    const date = new Date(post.created_at).toLocaleString('sr-RS', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
                    
                    let postHtml = `
                        <div class="post-card">
                            <div class="post-meta">✏️ <strong>${post.autor}</strong> • ${date}</div>
                            <div class="post-text">${post.tekst}</div>
                            <div class="reactions">
                                <button class="react-btn" onclick="addReaction(${post.id}, '❤️')">❤️ <span>${post.reakcija || ''}</span></button>
                            </div>
                        </div>
                    `;
                    feedContainer.innerHTML += postHtml;
                });

            } catch (error) {
                console.error(error);
                feedContainer.innerHTML = "<p style='color:red;'>Greška pri učitavanju.</p>";
            }
        }

        async function addReaction(postId, emoji) {
            try {
                await supabase
                    .from('poruke')
                    .update({ reakcija: emoji })
                    .eq('id', postId);

                loadFeed();
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
